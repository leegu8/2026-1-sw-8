<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>독서 아이트래킹 — 로그인</title>
    <link rel="stylesheet" href="static/css/common.css">
    <link rel="stylesheet" href="static/css/auth.css">
</head>
<body>

    <!-- 내비게이션 바 -->
    <nav class="navbar">
        <a href="index.html" class="navbar-logo">👁 독서 아이트래킹</a>
        <a href="signup.html" class="navbar-link">계정이 없으신가요? 회원가입 →</a>
    </nav>

    <!-- 로그인 카드 -->
    <div class="page-wrap">
        <div class="card card--login">
            <div class="card-icon">🔐</div>
            <h1 class="card-title">로그인</h1>
            <p class="card-sub">계정에 로그인하여 독서 분석을 시작하세요</p>

            <form id="login-form">
                <div class="form-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" placeholder="example@email.com" autocomplete="email" />
                </div>

                <div class="form-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" placeholder="비밀번호를 입력하세요" autocomplete="current-password" />
                </div>

                <div class="form-options">
                    <label>
                        <input type="checkbox" /> 자동 로그인
                    </label>
                    <a href="#">비밀번호 찾기</a>
                </div>

                <button type="submit" class="btn-submit btn-submit--login">로그인</button>
                <p class="status-msg" id="status-msg"></p>
            </form>

            <div class="divider">또는</div>

            <!-- [TODO] 소셜 로그인 연동 -->
            <button class="btn-social"><span>🟡</span> 카카오로 로그인</button>
            <button class="btn-social"><span>🔵</span> 구글로 로그인</button>

            <div class="card-footer">
                아직 계정이 없으신가요? <a href="signup.html">회원가입</a>
            </div>
        </div>
    </div>

    <script src="static/js/login.js"></script>
</body>
</html>
