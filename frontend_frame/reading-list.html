<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>독서 아이트래킹 — 독서 목록</title>
    <link rel="stylesheet" href="static/css/common.css">
    <link rel="stylesheet" href="static/css/reading-list.css">
</head>
<body>

    <!-- 내비게이션 바 -->
    <nav class="navbar">
        <a href="index.html" class="navbar-logo">👁 독서 아이트래킹</a>
        <div class="navbar-right">
            <!-- [TODO] 로그인 유저 닉네임 + 레벨 배지 -->
            <span class="navbar-user" id="navbar-user"></span>
            <a href="index.html" class="btn btn-outline">로그아웃</a>
        </div>
    </nav>

    <!-- 본문 -->
    <div class="library-wrap">

        <!-- 사용자 환영 + 레벨 -->
        <div class="user-banner">
            <div class="user-banner-info">
                <h2 id="banner-greeting">안녕하세요!</h2>
                <p id="banner-level-desc"><!-- [TODO] "현재 레벨: 중등 | 이번 달 독서 2회" --></p>
            </div>
            <div class="level-badge" id="level-badge">
                <!-- [TODO] 레벨 배지 (초등/중등/고등) -->
                중등
            </div>
        </div>

        <!-- 탭 -->
        <div class="tab-bar">
            <button class="tab-btn active" data-tab="curriculum">📚 나의 커리큘럼</button>
            <button class="tab-btn"        data-tab="all">🔍 전체 도서 목록</button>
        </div>

        <!-- ── 탭 1: 나의 커리큘럼 ── -->
        <section id="tab-curriculum" class="tab-panel">
            <div class="section-header">
                <h3>레벨에 맞는 추천 도서</h3>
                <p>현재 레벨에 최적화된 독서 자료입니다. 순서대로 읽으면 효과적입니다.</p>
            </div>

            <div class="book-grid" id="curriculum-grid">
                <!-- 커리큘럼 카드 — JS가 렌더링 -->
            </div>
        </section>

        <!-- ── 탭 2: 전체 도서 목록 ── -->
        <section id="tab-all" class="tab-panel" style="display:none">
            <div class="section-header">
                <div class="filter-row">
                    <h3>전체 도서 목록</h3>
                    <div class="filter-group">
                        <button class="filter-btn active" data-level="all">전체</button>
                        <button class="filter-btn" data-level="초등">초등</button>
                        <button class="filter-btn" data-level="중등">중등</button>
                        <button class="filter-btn" data-level="고등">고등</button>
                    </div>
                </div>
                <p>원하는 도서를 자유롭게 선택할 수 있습니다.</p>
            </div>

            <div class="book-grid" id="all-grid">
                <!-- 전체 도서 카드 — JS가 렌더링 -->
            </div>
        </section>

    </div>

    <script src="static/js/reading-list.js"></script>
</body>
</html>
