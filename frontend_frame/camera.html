<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>독서 아이트래킹 — 카메라 선택</title>
    <link rel="stylesheet" href="static/css/common.css">
    <link rel="stylesheet" href="static/css/setup.css">
</head>
<body>

    <!-- 내비게이션 바 -->
    <nav class="navbar">
        <a href="index.html" class="navbar-logo">👁 독서 아이트래킹</a>
        <span class="navbar-user" id="navbar-user"><!-- [TODO] 로그인 유저 닉네임 --></span>
    </nav>

    <!-- 단계 진행바 -->
    <div class="step-bar">
        <div class="step-item active">
            <div class="step-circle">1</div>
            <span>카메라 선택</span>
        </div>
        <div class="step-line"></div>
        <div class="step-item">
            <div class="step-circle">2</div>
            <span>시선 보정</span>
        </div>
        <div class="step-line"></div>
        <div class="step-item">
            <div class="step-circle">3</div>
            <span>설문</span>
        </div>
        <div class="step-line"></div>
        <div class="step-item">
            <div class="step-circle">4</div>
            <span>독서 시작</span>
        </div>
    </div>

    <!-- 본문 -->
    <div class="setup-wrap">
        <h2 class="setup-title">📷 카메라 선택</h2>
        <p class="setup-sub">시선 추적에 사용할 웹캠을 선택하고 미리보기를 확인하세요.</p>

        <div class="camera-layout">

            <!-- 카메라 목록 -->
            <div>
                <p class="section-label">사용 가능한 카메라</p>
                <div id="camera-list" class="camera-list">
                    <p class="loading-text">카메라 목록을 불러오는 중...</p>
                </div>
                <button id="refresh-btn" class="refresh-btn">↻ 목록 새로고침</button>
            </div>

            <!-- 미리보기 -->
            <div>
                <p class="section-label">카메라 미리보기</p>
                <div class="preview-box">
                    <div class="preview-placeholder" id="preview-placeholder">
                        <span>📷</span>
                        <p>카메라를 선택하면<br>미리보기가 표시됩니다</p>
                    </div>
                    <img id="preview-img" class="preview-img" src="" alt="카메라 미리보기" />
                </div>
                <p class="preview-hint" id="preview-hint"></p>
            </div>

        </div>

        <p class="status-msg" id="status-msg"></p>
        <button id="next-btn" class="btn-setup btn-setup--camera" disabled>
            다음: 시선 보정 →
        </button>
    </div>

    <script src="static/js/camera.js"></script>
</body>
</html>
