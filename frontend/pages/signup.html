<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>독서 아이트래킹 — 회원가입</title>
    <link rel="stylesheet" href="/static/common.css">
    <link rel="stylesheet" href="/static/auth.css">
</head>
<body>

    <nav class="navbar">
        <a href="/" class="navbar-logo">👁 독서 아이트래킹</a>
        <a href="/login.html" class="navbar-link">이미 계정이 있으신가요? 로그인 →</a>
    </nav>

    <div class="page-wrap">
        <div class="card card--signup">
            <div class="card-icon">✏️</div>
            <h1 class="card-title">회원가입</h1>
            <p class="card-sub">계정을 만들고 독서 습관 분석을 시작하세요</p>

            <form id="signup-form">
                <div class="form-group">
                    <label for="nickname">닉네임</label>
                    <input type="text" id="nickname" placeholder="사용할 닉네임을 입력하세요" maxlength="20" autocomplete="nickname" />
                    <p class="field-hint" id="hint-nickname">2~20자 이내로 입력해주세요.</p>
                </div>

                <div class="form-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" placeholder="example@email.com" autocomplete="email" />
                    <p class="field-hint" id="hint-email"></p>
                </div>

                <div class="form-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" placeholder="8자 이상 입력하세요" autocomplete="new-password" />
                    <div class="strength-wrap">
                        <div class="strength-bar" id="bar1"></div>
                        <div class="strength-bar" id="bar2"></div>
                        <div class="strength-bar" id="bar3"></div>
                    </div>
                    <p class="field-hint" id="hint-password"></p>
                </div>

                <div class="form-group">
                    <label for="password-confirm">비밀번호 확인</label>
                    <input type="password" id="password-confirm" placeholder="비밀번호를 다시 입력하세요" autocomplete="new-password" />
                    <p class="field-hint" id="hint-confirm"></p>
                </div>

                <div class="form-group">
                    <label for="level">독서 수준</label>
                    <select id="level">
                        <option value="">선택해주세요</option>
                        <option value="초등">초등</option>
                        <option value="중등">중등</option>
                        <option value="고등">고등</option>
                    </select>
                    <p class="field-hint" id="hint-level"></p>
                </div>

                <div class="terms-group">
                    <input type="checkbox" id="terms" />
                    <label for="terms">
                        <a href="#">이용약관</a> 및 <a href="#">개인정보 처리방침</a>에 동의합니다. (필수)
                    </label>
                </div>

                <button type="submit" class="btn-submit btn-submit--signup">가입하기</button>
                <p class="status-msg" id="status-msg"></p>
            </form>

            <div class="card-footer">
                이미 계정이 있으신가요? <a href="/login.html">로그인</a>
            </div>
        </div>
    </div>

    <script src="/static/js/signup.js"></script>
</body>
</html>
