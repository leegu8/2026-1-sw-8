<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>독서 아이트래킹 — 로그인</title>
    <link rel="stylesheet" href="/static/common.css">
    <link rel="stylesheet" href="/static/auth.css">
</head>
<body>

    <nav class="navbar">
        <a href="/" class="navbar-logo">👁 독서 아이트래킹</a>
        <a href="/signup.html" class="navbar-link">계정이 없으신가요? 회원가입 →</a>
    </nav>

    <div class="page-wrap">
        <div class="card card--login">
            <div class="card-icon">🔐</div>
            <h1 class="card-title">로그인</h1>
            <p class="card-sub">계정에 로그인하여 독서 분석을 시작하세요</p>

            <form id="login-form">
                <div class="form-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" placeholder="example@email.com" autocomplete="email" />
                </div>

                <div class="form-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" placeholder="비밀번호를 입력하세요" autocomplete="current-password" />
                </div>

                <div class="form-options">
                    <label>
                        <input type="checkbox" /> 자동 로그인
                    </label>
                    <a href="#">비밀번호 찾기</a>
                </div>

                <button type="submit" class="btn-submit btn-submit--login">로그인</button>
                <p class="status-msg" id="status-msg"></p>
            </form>

            <div class="divider">또는</div>

            <button class="btn-social" onclick="devLogin()"><span>🛠</span> 개발자로 로그인하기</button>
            <button class="btn-social" onclick="guestLogin()"><span>👤</span> 임시 사용자로 로그인하기</button>

            <div class="card-footer">
                아직 계정이 없으신가요? <a href="/signup.html">회원가입</a>
            </div>
        </div>
    </div>

    <script src="/static/js/login.js"></script>
    <script>
    async function devLogin() {
        const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: 'admin@admin.com', password: 'admin1234' }),
        });
        if (!res.ok) { alert('개발자 로그인 실패 — 서버를 재시작해주세요'); return; }
        const data = await res.json();
        localStorage.setItem('user_id',    String(data.id));
        localStorage.setItem('user_email', data.email);
        localStorage.setItem('user_nick',  data.nickname);
        localStorage.setItem('user_level', data.level ?? '고등');
        fetch('/api/db/attendance', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ user_id: data.id }),
        }).catch(() => {});
        location.href = '/home.html';
    }
    async function guestLogin() {
        localStorage.setItem('user_id',    '101');
        localStorage.setItem('user_email', 'guest@temp.com');
        localStorage.setItem('user_nick',  '게스트');
        localStorage.setItem('user_level', '중등');
        fetch('/api/db/attendance', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ user_id: 101 }),
        }).catch(() => {});
        location.href = '/home.html';
    }
    </script>
</body>
</html>
