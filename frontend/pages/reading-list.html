<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>독서 아이트래킹 — 독서 목록</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/reading-list.css">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css" />
    <link rel="stylesheet" href="/static/aurora-theme.css">
    <script src="/static/js/auth-guard.js"></script>
</head>
<body>
<div class="aurora-bg"><div class="aurora-layer"></div></div>

    <nav class="navbar">
        <a href="/home.html" class="navbar-logo">👁 독서 아이트래킹</a>
        <div class="navbar-right">
            <span class="navbar-user" id="navbar-user"></span>
            <a href="/growth.html" class="btn btn-outline">성장일지</a>
            <a href="/guide.html" class="btn btn-outline">가이드</a>
            <a href="#" class="btn-logout" onclick="localStorage.clear();sessionStorage.clear();location.href='/home.html'">로그아웃</a>
        </div>
    </nav>

    <div class="library-wrap">

        <div class="user-banner">
            <div class="user-banner-info">
                <h2 id="banner-greeting">안녕하세요!</h2>
            </div>
        </div>

        <div class="tab-bar">
            <button class="tab-btn active" data-tab="all">📚 전체 도서 목록</button>
            <button class="tab-btn"        data-tab="read">✅ 읽은 도서</button>
        </div>

        <section id="tab-all" class="tab-panel">
            <div class="section-header">
                <h3>전체 도서 목록</h3>
                <p>원하는 도서를 자유롭게 선택할 수 있습니다.</p>
            </div>
            <div class="book-grid" id="all-grid"></div>
        </section>

        <section id="tab-read" class="tab-panel" style="display:none">
            <div class="section-header">
                <h3>읽은 도서</h3>
                <p>지금까지 완독한 도서 목록입니다.</p>
            </div>
            <div class="book-grid" id="read-grid"></div>
        </section>

    </div>

    <script src="/static/js/reading-list.js"></script>
</body>
</html>
