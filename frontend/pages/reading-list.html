<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>독서 아이트래킹 — 독서 목록</title>
    <link rel="stylesheet" href="/static/base.css">
    <link rel="stylesheet" href="/static/aurora-theme.css">
    <link rel="stylesheet" href="/static/reading-list.css">
    <script src="/static/js/auth-guard.js"></script>
    <style>body { min-width: 0; }</style>
</head>
<body>
<div class="aurora-bg"><div class="aurora"></div></div>

    <nav class="top">
      <div class="container">
        <a class="brand" href="/">
          <div class="brand-mark">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
              <path d="M2 12C4 7 7.5 5 12 5C16.5 5 20 7 22 12C20 17 16.5 19 12 19C7.5 19 4 17 2 12Z" stroke="#04102E" stroke-width="2"/>
              <circle cx="12" cy="12" r="3" fill="#04102E"/>
            </svg>
          </div>
          <div>
            <div class="brand-name">독서 아이트래킹</div>
            <div class="brand-mono">EYE-TRACKING · READING</div>
          </div>
        </a>
        <div class="nav-links" style="gap:24px;">
          <span class="navbar-user" id="navbar-user"></span>
          <a href="/growth.html" class="nav-link">성장일지</a>
          <a href="/guide.html" class="nav-link">가이드</a>
          <a href="/" class="nav-link" onclick="localStorage.clear();fetch('/api/webcam/stop',{method:'POST'})">로그아웃</a>
        </div>
      </div>
    </nav>

    <div class="library-wrap">

        <div class="user-banner">
            <div class="user-banner-info">
                <div class="user-banner-eyebrow">독서 아이트래킹 · READING</div>
                <h2 id="banner-greeting">안녕하세요!</h2>
                <p id="banner-level-desc"></p>
            </div>
            <div class="level-badge" id="level-badge">중등</div>
        </div>

        <div class="tab-bar">
            <button class="tab-btn active" data-tab="curriculum">📚 나의 커리큘럼</button>
            <button class="tab-btn"        data-tab="all">🔍 전체 도서 목록</button>
            <button class="tab-btn"        data-tab="read">✅ 읽은 도서</button>
        </div>

        <section id="tab-curriculum" class="tab-panel">
            <div class="section-header">
                <h3>레벨에 맞는 추천 도서</h3>
                <p>현재 레벨에 최적화된 독서 자료입니다. 순서대로 읽으면 효과적입니다.</p>
            </div>
            <div class="book-grid" id="curriculum-grid"></div>
        </section>

        <section id="tab-all" class="tab-panel" style="display:none">
            <div class="section-header">
                <div class="filter-row">
                    <h3>전체 도서 목록</h3>
                    <div class="filter-group">
                        <button class="filter-btn active" data-level="all">전체</button>
                        <button class="filter-btn" data-level="초등">초등</button>
                        <button class="filter-btn" data-level="중등">중등</button>
                        <button class="filter-btn" data-level="고등">고등</button>
                    </div>
                </div>
                <p>원하는 도서를 자유롭게 선택할 수 있습니다.</p>
            </div>
            <div class="book-grid" id="all-grid"></div>
        </section>

        <section id="tab-read" class="tab-panel" style="display:none">
            <div class="section-header">
                <h3>읽은 도서</h3>
                <p>지금까지 완독한 도서 목록입니다.</p>
            </div>
            <div class="book-grid" id="read-grid"></div>
        </section>

    </div>

    <script src="/static/js/reading-list.js"></script>
</body>
</html>
