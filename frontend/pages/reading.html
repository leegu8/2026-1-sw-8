<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>독서하기 - 독서 아이트래킹</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css" />
    <link rel="stylesheet" href="/static/aurora-theme.css">
    <script src="/static/js/auth-guard.js"></script>
    <style>
        html, body      { height: 100%; overflow: hidden; }
        body            { display: flex; flex-direction: column; }
        .page-content   { flex: 1; min-height: 0; display: flex; flex-direction: column;
                          align-items: center; justify-content: center; gap: 1.25rem;
                          padding: 1.5rem 0 !important; }
        .reading-area   {
            position: relative; overflow: hidden; flex-shrink: 0;
            width: min(780px, calc(100vw - 3rem));
            height: min(560px, calc(100vh - 210px));
            background: #F9F7F2;
            border: 18px solid #6B2E18;
            border-radius: 4px;
            padding: 2rem 2.6rem !important;
            box-shadow:
                inset 0 0 24px rgba(0,0,0,0.07),
                0 6px 32px rgba(0,0,0,0.40),
                0 2px 8px rgba(0,0,0,0.25);
            margin-bottom: 0;
        }
        .reading-controls { flex-shrink: 0; padding: 0; }
        #book-title     { display: none; }
        .reading-text   { position: relative; z-index: 1; font-size: 24px; line-height: 2.2;
                          overflow: hidden; color: #1C1008; word-break: keep-all; }
        .reading-text p            { display: inline; margin: 0; }
        .reading-text p::after     { content: " "; }
        .reading-text p.para-start { display: block; margin-top: 1.4em; }
        .word           { display: inline; transition: filter 0.25s; }
        .word-blur      { filter: blur(5px); opacity: 0.3; user-select: none; }
        #line-highlight-bar {
            position: absolute; left: 0; right: 0;
            background: rgba(52,152,219,0.13);
            border-left: 3px solid rgba(52,152,219,0.55);
            border-radius: 0 4px 4px 0;
            pointer-events: none; display: none; opacity: 0;
            transition: top 0.08s ease, opacity 0.4s ease; z-index: 0;
        }
        #callout-focus {
            position: fixed; display: none; align-items: center;
            z-index: 9990; pointer-events: none;
        }
        #callout-focus.show { display: flex; }
        .callout-arrow { width:0; height:0; border-top:7px solid transparent; border-bottom:7px solid transparent; flex-shrink:0; }
        .callout-box   { padding:5px 10px; border-radius:6px; font-size:0.78rem; font-weight:700; white-space:nowrap; }
        #callout-focus .callout-arrow { border-left: 8px solid rgba(52,152,219,0.9); }
        #callout-focus .callout-box   { background: rgba(52,152,219,0.9); color:#fff; }
        #page-indicator {
            font-size: 0.85rem; color: rgba(28,28,46,0.5);
            font-variant-numeric: tabular-nums;
        }
    </style>
</head>
<body>
<div class="aurora-bg"><div class="aurora-layer"></div></div>
    <header class="page-header">
        <a class="brand" href="/home.html">
          <div class="brand-mark">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
              <path d="M2 12C4 7 7.5 5 12 5C16.5 5 20 7 22 12C20 17 16.5 19 12 19C7.5 19 4 17 2 12Z" stroke="#04102E" stroke-width="2" />
              <circle cx="12" cy="12" r="3" fill="#04102E" />
            </svg>
          </div>
          <div>
            <div class="brand-name">독서 아이트래킹</div>
            <div class="brand-mono">EYE-TRACKING · READING</div>
          </div>
        </a>
        <span class="navbar-user" id="nav-user"></span>
        <div class="progress-bar">
            <div class="progress-step done">
                <div class="circle">✓</div> 웹캠 연결
            </div>
            <div class="progress-line"></div>
            <div class="progress-step done">
                <div class="circle">✓</div> 사용 안내
            </div>
            <div class="progress-line"></div>
            <div class="progress-step active">
                <div class="circle">3</div> 독서하기
            </div>
        </div>
    </header>

    <div class="page-content">
        <div class="reading-area">
            <div id="line-highlight-bar"></div>
            <h2 id="book-title">📖 불러오는 중...</h2>
            <div class="reading-text"></div>
        </div>

        <div class="reading-controls">
            <button id="prev-page-btn" class="btn btn-line"    style="display:none;">← 이전 페이지</button>
            <button id="next-page-btn" class="btn btn-primary" style="display:none;">다음 페이지 →</button>
            <button id="done-btn"      class="btn btn-success" style="display:none;">다 읽었어요 →</button>
            <button id="recal-btn"     class="btn btn-warning">재보정</button>
            <div id="reading-status" style="color:#666; font-size:0.95rem;"></div>
            <div id="page-indicator"></div>
        </div>
    </div>

    <script src="/static/js/reading-user.js" defer></script>
    <div id="callout-focus">
        <div class="callout-box"></div>
        <div class="callout-arrow"></div>
    </div>
<script>
(function() {
    const nick = localStorage.getItem('user_nick') || sessionStorage.getItem('user_nick') || '';
    const el = document.getElementById('nav-user');
    if (el && nick) el.innerHTML = '<span class="avatar">' + nick[0] + '</span>' + nick + '님';
})();
</script>
</body>
</html>
