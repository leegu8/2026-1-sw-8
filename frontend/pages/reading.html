<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>독서하기 - 독서 아이트래킹</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .reading-area   { position: relative; }
        #line-highlight-bar {
            position: absolute; left: 0; right: 0;
            background: rgba(52, 152, 219, 0.13);
            border-left: 3px solid rgba(52, 152, 219, 0.55);
            border-radius: 0 4px 4px 0;
            pointer-events: none;
            display: none;
            transition: top 0.08s ease;
            z-index: 0;
        }
        #book-title     { font-size: 1.9rem; }
        .reading-text   { position: relative; z-index: 1; font-size: 1.12rem; line-height: 2; }
        .reading-text p { margin: 0 0 1.2em; }
        .word           { display: inline; transition: filter 0.25s; }
        .word-blur      { filter: blur(3.5px); user-select: none; }
    </style>
</head>
<body>
    <div id="gaze-dot"></div>

    <header class="page-header">
        <div class="logo">👁 독서 아이트래킹</div>
        <div class="progress-bar">
            <div class="progress-step done">
                <div class="circle">✓</div> 시선 보정
            </div>
            <div class="progress-line"></div>
            <div class="progress-step done">
                <div class="circle">✓</div> 사용 안내
            </div>
            <div class="progress-line"></div>
            <div class="progress-step active">
                <div class="circle">3</div> 독서하기
            </div>
        </div>
    </header>

    <div class="page-content">
        <div class="reading-area">
            <div id="line-highlight-bar"></div>
            <h2 id="book-title">📖 불러오는 중...</h2>
            <div class="reading-text"></div>
        </div>

        <div class="reading-controls">
            <button id="done-btn"  class="btn btn-success">다 읽었어요 →</button>
            <button id="recal-btn" class="btn btn-warning">재보정</button>
            <div id="reading-status" style="color:#666; font-size:0.95rem;"></div>
        </div>
    </div>

    <!-- 개발자 모드 배지 -->
    <div id="dev-mode-badge" style="
        display: none;
        position: fixed;
        top: 68px;
        right: 20px;
        background: #8e44ad;
        color: white;
        padding: 8px 18px;
        border-radius: 8px;
        font-size: 0.85rem;
        font-weight: 600;
        z-index: 9999;
        box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        pointer-events: none;
    ">🖱 개발자 모드</div>

    <!-- 피로 감지 토스트 -->
    <div id="fatigue-toast" class="fatigue-toast">😴 독서 속도가 느려졌어요. 잠깐 쉬었다 읽는 건 어떨까요?</div>

    <script src="/static/js/reading.js" defer></script>
</body>
</html>
