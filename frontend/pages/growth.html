<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>독서 아이트래킹 — 성장일지</title>
    <link rel="stylesheet" href="/static/base.css">
    <link rel="stylesheet" href="/static/aurora-theme.css">
    <link rel="stylesheet" href="/static/growth.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/static/js/auth-guard.js"></script>
    <style>
        body { min-width: 0; }
    </style>
</head>
<body>
<div class="aurora-bg"><div class="aurora"></div></div>

    <nav class="top">
      <div class="container">
        <a class="brand" href="/">
          <div class="brand-mark">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
              <path d="M2 12C4 7 7.5 5 12 5C16.5 5 20 7 22 12C20 17 16.5 19 12 19C7.5 19 4 17 2 12Z" stroke="#04102E" stroke-width="2"/>
              <circle cx="12" cy="12" r="3" fill="#04102E"/>
            </svg>
          </div>
          <div>
            <div class="brand-name">독서 아이트래킹</div>
            <div class="brand-mono">EYE-TRACKING · READING</div>
          </div>
        </a>
        <div class="nav-links" style="gap:24px;">
          <span class="navbar-user" id="navbar-user"></span>
          <a id="back-to-list" href="/reading-list.html" class="nav-link">← 도서 목록</a>
          <a href="/" class="nav-link" onclick="localStorage.clear();fetch('/api/webcam/stop',{method:'POST'})">로그아웃</a>
        </div>
      </div>
    </nav>

    <div class="growth-wrap">

        <div class="growth-header">
            <div class="growth-eyebrow">성장일지 · GROWTH JOURNAL</div>
            <h2 id="growth-title">성장일지</h2>
            <p id="growth-sub">최근 5회 독서 세션의 변화를 확인하세요</p>
        </div>

        <div class="attendance-card" id="attendance-card">
            <div class="attendance-streak">
                <span class="streak-fire">🔥</span>
                <span class="streak-num" id="streak-num">0</span>
                <span class="streak-label">일 연속 출석</span>
            </div>
            <div class="attendance-total">누적 출석 <strong id="total-days">0</strong>일</div>
            <div class="attendance-dots" id="attendance-dots"></div>
        </div>

        <div id="growth-summary"></div>

        <div id="no-data" class="empty-state" style="display:none">
            아직 완독한 세션이 없습니다.<br>독서를 시작해보세요!
        </div>

        <div id="growth-content">
            <div class="session-list" id="session-list"></div>

            <div class="chart-card score-chart-card">
                <h4>📈 종합점수 추세</h4>
                <canvas id="chart-score"></canvas>
            </div>

            <div class="chart-card">
                <div class="metric-selector" id="metric-selector"></div>
                <p class="metric-desc" id="metric-desc"></p>
                <canvas id="chart-metric"></canvas>
            </div>
        </div>

    </div>

    <script src="/static/js/growth.js"></script>
    <script>
    window.addEventListener('DOMContentLoaded', () => {
        const el = document.getElementById('growth-title');
        if (!el) return;
        el.style.setProperty('display', 'inline-block', 'important');
        el.style.setProperty('background', 'linear-gradient(135deg, #ffffff 0%, #3FB6FF 25%, #3FB6FF 52%, #a78bfa 65%, #e9b8f5 75%, #ffffff 92%)', 'important');
        el.style.setProperty('-webkit-background-clip', 'text', 'important');
        el.style.setProperty('-webkit-text-fill-color', 'transparent', 'important');
        el.style.setProperty('background-clip', 'text', 'important');
    });
    </script>
</body>
</html>
