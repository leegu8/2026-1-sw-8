<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>독서 아이트래킹 — 성장일지</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/common.css">
    <link rel="stylesheet" href="/static/growth.css">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css" />
    <link rel="stylesheet" href="/static/aurora-theme.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/static/js/auth-guard.js"></script>
</head>
<body>
<div class="aurora-bg"><div class="aurora-layer"></div></div>

    <nav class="navbar">
        <a href="/home.html" class="navbar-logo">👁 독서 아이트래킹</a>
        <div class="navbar-right">
            <span class="navbar-user" id="navbar-user"></span>
            <a id="back-to-list" href="/reading-list-user.html" class="btn btn-outline">← 도서 목록</a>
            <a href="#" class="btn-logout" onclick="localStorage.clear();sessionStorage.clear();location.href='/home.html'">로그아웃</a>
        </div>
    </nav>

    <div class="growth-wrap">

        <div class="growth-header">
            <h2 id="growth-title">성장일지</h2>
            <p id="growth-sub">최근 5회 독서 세션의 변화를 확인하세요</p>
        </div>

        <div class="attendance-card" id="attendance-card">
            <div class="attendance-streak">
                <span class="streak-fire">🔥</span>
                <span class="streak-num" id="streak-num">0</span>
                <span class="streak-label">일 연속 출석</span>
            </div>
            <div class="attendance-total">누적 출석 <strong id="total-days">0</strong>일</div>
            <div class="attendance-dots" id="attendance-dots"></div>
        </div>

        <div id="growth-summary"></div>

        <div id="no-data" class="empty-state" style="display:none">
            아직 완독한 세션이 없습니다.<br>독서를 시작해보세요!
        </div>

        <div id="growth-content">
            <div class="session-list" id="session-list"></div>

            <div class="chart-card score-chart-card">
                <h4>📈 종합점수 추세</h4>
                <canvas id="chart-score"></canvas>
            </div>

            <div class="chart-card">
                <div class="metric-selector" id="metric-selector"></div>
                <p class="metric-desc" id="metric-desc"></p>
                <canvas id="chart-metric"></canvas>
            </div>
        </div>

    </div>

    <script src="/static/js/growth.js"></script>
</body>
</html>
