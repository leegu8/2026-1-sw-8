<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>독서 아이트래킹 — 도서 등록</title>
    <link rel="stylesheet" href="/static/common.css">
    <link rel="stylesheet" href="/static/book-write.css">
</head>
<body>

    <nav class="navbar">
        <a href="/" class="navbar-logo">👁 독서 아이트래킹</a>
        <div class="navbar-right">
            <a href="/reading-list.html" class="btn btn-outline">← 도서 목록</a>
            <a href="/" class="btn btn-outline">로그아웃</a>
        </div>
    </nav>

    <div class="write-wrap">
        <div class="write-card">
            <div class="write-header">
                <h2>도서 등록</h2>
                <p>독서 페이지에 표시할 글을 등록합니다.</p>
            </div>

            <form id="book-form">

                <div class="form-group">
                    <label for="title">제목 <span class="required">*</span></label>
                    <input type="text" id="title" placeholder="글 제목을 입력하세요" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="difficulty">난이도 <span class="required">*</span></label>
                        <select id="difficulty" required>
                            <option value="" disabled selected>선택</option>
                            <option value="초등">초등</option>
                            <option value="중등">중등</option>
                            <option value="고등">고등</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="genre">장르</label>
                        <select id="genre">
                            <option value="없음" selected>없음</option>
                            <option value="소설">소설</option>
                            <option value="에세이">에세이</option>
                            <option value="비문학">비문학</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="content">
                        본문 <span class="required">*</span>
                        <span class="word-count" id="word-count">0자</span>
                    </label>
                    <textarea id="content" rows="16" placeholder="독서 페이지에 표시할 본문을 입력하세요." required></textarea>
                </div>

                <div id="msg" class="msg" style="display:none"></div>

                <div class="form-actions">
                    <button type="button" class="btn btn-outline-dark" onclick="history.back()">취소</button>
                    <button type="submit" class="btn btn-blue btn-large" id="submit-btn">등록하기</button>
                </div>

            </form>
        </div>
    </div>

    <script src="/static/js/book-write.js"></script>
</body>
</html>
