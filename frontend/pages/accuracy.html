<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시선 추적 정확도 측정</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/base.css">
    <link rel="stylesheet" href="/static/aurora-theme.css">
    <script src="/static/js/auth-guard.js"></script>
    <style>
        body { background: #04081C !important; }
        .acc-wrap  { max-width: 860px; margin: 0 auto; padding: 32px 24px 80px; }
        .acc-title { font-size: 1.4rem; font-weight: 700; color: #E8EEFF; margin-bottom: 6px; }
        .acc-sub   { font-size: 0.88rem; color: rgba(232,238,255,0.45); margin-bottom: 28px; }

        .reading-area {
            position: relative;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 12px;
            padding: 28px 36px;
            overflow: hidden;
        }
        .reading-text { font-size: 1.05rem; line-height: 1.9; color: #dde6ff; word-break: keep-all; }
        .reading-text p { margin: 0 0 0.5em; }

        #target-highlight {
            position: absolute; left: 0; right: 0;
            background: rgba(110,231,166,0.15);
            border-left: 3px solid rgba(110,231,166,0.75);
            border-radius: 0 4px 4px 0;
            pointer-events: none;
            display: none;
            transition: top 0.08s ease;
            z-index: 10;
        }

        #status-box {
            margin-top: 18px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            padding: 14px 20px;
            display: flex; align-items: center; gap: 16px;
        }
        #status-msg  { font-size: 1rem; font-weight: 600; color: #E8EEFF; flex: 1; }
        #status-prog { font-size: 0.85rem; color: rgba(232,238,255,0.4); white-space: nowrap; }

        #moving-dot {
            position: fixed;
            width: 16px; height: 16px;
            background: #6EE7A6;
            border-radius: 50%;
            pointer-events: none;
            display: none;
            transform: translate(-50%, -50%);
            z-index: 9999;
            box-shadow: 0 0 10px rgba(110,231,166,0.7);
        }

        #start-box {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px; padding: 36px 32px;
            margin-top: 24px; text-align: center;
        }
        #start-box ul {
            text-align: left; display: inline-block;
            margin: 16px 0 28px; padding: 0 0 0 20px;
            color: rgba(232,238,255,0.65); font-size: 0.9rem; line-height: 2.1;
        }

        #results-box { display: none; margin-top: 28px; }
        .result-score { font-size: 3.2rem; font-weight: 700; text-align: center; margin-bottom: 4px; }
        .result-label { text-align: center; font-size: 0.88rem; color: rgba(232,238,255,0.4); margin-bottom: 24px; }
        .result-table { width: 100%; border-collapse: collapse; }
        .result-table th, .result-table td {
            padding: 9px 14px; font-size: 0.88rem; text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            color: rgba(232,238,255,0.8);
        }
        .result-table th { color: rgba(232,238,255,0.4); font-weight: 500; }
        .mini-bar { height: 6px; border-radius: 4px; background: rgba(255,255,255,0.08); width: 140px; }
        .mini-fill { height: 100%; border-radius: 4px; }

        #gaze-dot {
            position: fixed; width: 12px; height: 12px;
            background: rgba(110,231,166,0.8); border-radius: 50%;
            pointer-events: none; transform: translate(-50%,-50%);
            z-index: 9999; display: none;
        }
    </style>
</head>
<body>
<div id="gaze-dot"></div>
<div id="moving-dot"></div>

<nav class="top">
    <div class="container">
        <a class="brand" href="/">
            <div class="brand-mark">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                    <path d="M2 12C4 7 7.5 5 12 5C16.5 5 20 7 22 12C20 17 16.5 19 12 19C7.5 19 4 17 2 12Z" stroke="#04102E" stroke-width="2"/>
                    <circle cx="12" cy="12" r="3" fill="#04102E"/>
                </svg>
            </div>
            <div>
                <div class="brand-name">독서 아이트래킹</div>
                <div class="brand-mono">EYE-TRACKING · ACCURACY</div>
            </div>
        </a>
    </div>
</nav>

<main style="position:relative;z-index:1;padding-top:24px;">
<div class="acc-wrap">
    <div class="acc-title">👁 시선 추적 정확도 측정</div>
    <div class="acc-sub">독서 페이지와 동일한 줄 단위 감지 방식으로 정확도를 측정합니다.</div>

    <div id="start-box">
        <div style="font-size:1.05rem;font-weight:600;color:#E8EEFF;margin-bottom:4px;">측정 전 확인 사항</div>
        <ul>
            <li>카메라와 <strong>40~70cm</strong> 거리를 유지해 주세요</li>
            <li>측정 중 <strong>고개는 고정</strong>하고 눈만 움직여 주세요</li>
            <li>초록색으로 강조된 줄을 응시하면 자동으로 진행됩니다</li>
            <li>줄당 약 3초 소요 · 전체 약 20~30초</li>
        </ul>
        <button class="btn btn-primary" onclick="startTest()" style="min-width:140px;">측정 시작</button>
    </div>

    <div id="test-section" style="display:none;">
        <div style="position:relative;">
            <div class="reading-area" id="reading-area">
                <div id="target-highlight"></div>
                <div class="reading-text" id="reading-text"></div>
            </div>
        </div>
        <div id="status-box">
            <div id="status-msg">준비 중...</div>
            <div id="status-prog"></div>
        </div>
        <div style="margin-top:14px;text-align:center;">
            <button class="btn btn-primary" id="next-btn" onclick="nextLine()" style="display:none;min-width:140px;">
                다음 줄 →
            </button>
        </div>
    </div>

    <div id="results-box">
        <div class="result-score" id="result-score"></div>
        <div class="result-label">전체 평균 정확도 (줄 단위 감지 기준)</div>
        <div style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:10px;overflow:hidden;">
            <table class="result-table">
                <thead>
                    <tr>
                        <th>대상 줄</th>
                        <th>정확도</th>
                        <th>그래프</th>
                        <th>샘플/적중</th>
                    </tr>
                </thead>
                <tbody id="result-tbody"></tbody>
            </table>
        </div>
        <div style="text-align:center;margin-top:24px;display:flex;gap:12px;justify-content:center;">
            <button class="btn btn-line" onclick="location.reload()">다시 측정</button>
            <button class="btn btn-primary" onclick="history.back()">돌아가기</button>
        </div>
    </div>
</div>
</main>

<div style="position:fixed;inset:0;pointer-events:none;opacity:0.3;z-index:0;">
    <div class="aurora"></div>
</div>

<!-- Q키 보정 모드 배지 -->
<div id="cal-mode-badge" style="
    display: none; position: fixed; top: 80px; right: 20px;
    background: linear-gradient(135deg, #c0392b, #e74c3c);
    color: white; padding: 9px 18px; border-radius: 10px;
    font-size: 0.82rem; font-weight: 600; z-index: 9999;
    box-shadow: 0 4px 16px rgba(231,76,60,0.4);
    pointer-events: none; letter-spacing: 0.01em;
">🎯 마우스 보정 모드 &nbsp;|&nbsp; Q 로 해제</div>

<script src="/static/js/accuracy.js"></script>

<script type="module">
import { addCalibrationPoint, setYCorrection } from '/static/js/api/gazeApi.js';

const badge = document.getElementById('cal-mode-badge');
let calMode = false;
let sending = false;
const CLICK_COUNT = 20;

document.addEventListener('keydown', e => {
    if (e.key !== 'q' && e.key !== 'Q') return;
    calMode = !calMode;
    badge.style.display        = calMode ? 'block' : 'none';
    document.body.style.cursor = calMode ? 'crosshair' : '';
    setYCorrection(!calMode);
});

document.addEventListener('click', async e => {
    if (!calMode || sending) return;
    sending = true;
    try { await addCalibrationPoint(e.clientX, e.clientY, CLICK_COUNT); }
    finally { sending = false; }
});
</script>
</body>
</html>
