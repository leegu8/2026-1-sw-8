<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시선 보정 - 독서 아이트래킹</title>
    <link rel="stylesheet" href="/static/style.css?v=3">
</head>
<body>
    <!-- 시선 점: gaze.js 가 로드되면 자동으로 제어됨 -->
    <div id="gaze-dot"></div>

    <!-- 보정 오버레이: 버튼 클릭 시 화면 전체를 덮음 -->
    <div id="calibration-overlay">
        <div id="cal-header">
            <div id="cal-instruction">각 점을 바라보면서 5번씩 클릭하세요</div>
            <div id="cal-progress">0 / 9 완료</div>
            <div id="cal-face-status"></div>
        </div>

        <!-- 샘플 수집 중 표시되는 중앙 토스트 -->
        <div id="cal-sampling-toast">
            <div id="cal-toast-icon">👁</div>
            <div id="cal-toast-text">시선을 고정해 주세요</div>
            <div id="cal-toast-bar-wrap">
                <div id="cal-toast-bar"></div>
            </div>
        </div>

        <!-- 9개 보정 점은 JS 에서 동적으로 생성 -->
    </div>

    <header class="page-header">
        <div class="logo">👁 독서 아이트래킹</div>
        <div class="progress-bar">
            <div class="progress-step active">
                <div class="circle">1</div> 시선 보정
            </div>
            <div class="progress-line"></div>
            <div class="progress-step">
                <div class="circle">2</div> 사용 안내
            </div>
            <div class="progress-line"></div>
            <div class="progress-step">
                <div class="circle">3</div> 독서하기
            </div>
        </div>
    </header>

    <div class="page-content" style="text-align:center;">
        <h2 style="font-size:1.6rem; margin-bottom:12px;">시선 보정</h2>
        <p style="color:#666; margin-bottom:32px; line-height:1.8;">
            정확한 시선 추적을 위해 초기 보정이 필요합니다.<br>
            버튼을 누르면 화면이 어두워지고, 각 점을 <strong>바라보면서</strong> 클릭해 주세요.
        </p>
        <button id="start-btn" class="btn btn-primary">보정 시작</button>
        <div id="status"></div>
    </div>

    <!-- gaze.js: WebSocket 연결 + addCalibrationPoint() 함수 제공 -->
    <script src="/static/gaze.js"></script>
    <script>
    // ── 상수 ──────────────────────────────────────────────────
    const CLICKS_NEEDED = 5;   // 점 하나당 필요한 클릭 수

    // 9개 보정 점의 화면 위치 [가로%, 세로%]
    const CAL_POSITIONS = [
        [10, 10], [50, 10], [90, 10],
        [10, 50], [50, 50], [90, 50],
        [10, 90], [50, 90], [90, 90],
    ];

    let calCounts = new Array(9).fill(0);

    // ── 보정 점 생성 ──────────────────────────────────────────
    function createCalPoints() {
        const overlay = document.getElementById('calibration-overlay');
        overlay.querySelectorAll('.cal-point').forEach(el => el.remove());
        calCounts = new Array(9).fill(0);

        CAL_POSITIONS.forEach(([px, py], i) => {
            const div = document.createElement('div');
            div.className  = 'cal-point';
            div.style.left = `${px}%`;
            div.style.top  = `${py}%`;
            div.innerHTML  = `<span>${CLICKS_NEEDED}</span>`;

            div.addEventListener('click', async (e) => {
                e.stopPropagation();
                if (calCounts[i] >= CLICKS_NEEDED) return;

                // 수집 중 UI
                div.classList.add('collecting');
                div.querySelector('span').textContent = '';
                document.querySelectorAll('.cal-point').forEach(p => p.style.pointerEvents = 'none');

                // 중앙 토스트 + 진행바 표시
                const toast = document.getElementById('cal-sampling-toast');
                const bar   = document.getElementById('cal-toast-bar');
                toast.style.display = 'block';
                bar.classList.remove('running');
                void bar.offsetWidth;
                bar.classList.add('running');

                // 서버에 전송 → 서버가 500ms 동안 홍채 샘플링
                const result = await addCalibrationPoint(e.clientX, e.clientY);

                // 수집 완료: UI 복원
                div.classList.remove('collecting');
                toast.style.display = 'none';
                bar.classList.remove('running');
                document.querySelectorAll('.cal-point').forEach(p => p.style.pointerEvents = '');

                if (!result.success) {
                    div.querySelector('span').textContent = CLICKS_NEEDED - calCounts[i];
                    document.getElementById('cal-face-status').textContent = '⚠ 얼굴이 감지되지 않았습니다. 다시 클릭하세요.';
                    document.getElementById('cal-face-status').style.color = '#e74c3c';
                    return;
                }

                // 성공: 카운트 증가
                calCounts[i]++;
                const remaining = CLICKS_NEEDED - calCounts[i];
                div.querySelector('span').textContent = remaining === 0 ? '✓' : remaining;
                if (remaining === 0) div.classList.add('done');

                const completed = calCounts.filter(c => c >= CLICKS_NEEDED).length;
                document.getElementById('cal-progress').textContent = `${completed} / 9 완료`;

                if (completed === 9) onCalComplete();
            });

            overlay.appendChild(div);
        });
    }

    // ── 보정 완료 ─────────────────────────────────────────────
    function onCalComplete() {
        document.getElementById('cal-instruction').textContent = '보정 완료!';
        document.getElementById('cal-progress').textContent   = '다음 단계로 이동합니다...';
        setTimeout(() => {
            window.location.href = '/guide.html';
        }, 1200);
    }

    // ── 보정 시작 버튼 ────────────────────────────────────────
    document.getElementById('start-btn').addEventListener('click', async () => {
        // 이전 보정 데이터 초기화
        await clearCalibration();

        document.getElementById('start-btn').style.display    = 'none';
        document.getElementById('status').textContent         = '';
        document.getElementById('calibration-overlay').style.display = 'block';
        createCalPoints();
    });

    // gaze.js 콜백: 얼굴 감지 상태를 오버레이와 하단 모두에 표시
    function onFaceDetected() {
        const s  = document.getElementById('status');
        const fs = document.getElementById('cal-face-status');
        if (s.textContent  === '') s.textContent = '✅ 얼굴 감지됨. 보정을 시작하세요.';
        if (fs && fs.dataset.error !== '1') {
            fs.textContent = '✅ 얼굴 감지됨';
            fs.style.color = '#2ecc71';
        }
    }

    function onNoFace() {
        const s  = document.getElementById('status');
        const fs = document.getElementById('cal-face-status');
        if (s.textContent.startsWith('✅')) s.textContent = '⚠ 얼굴이 감지되지 않습니다. 웹캠을 확인하세요.';
        if (fs && fs.dataset.error !== '1') {
            fs.textContent = '⚠ 얼굴 미감지 — 카메라를 확인하세요';
            fs.style.color = '#e74c3c';
        }
    }
    </script>
</body>
</html>
