<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>독서 아이트래킹</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .camera-option {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .camera-option:hover       { border-color: #3498db; }
        .camera-option.selected    { border-color: #3498db; background: #eaf4fd; }
        .camera-option input       { margin: 0; }
        .camera-option .cam-label  { font-size: 0.95rem; flex: 1; }
        .camera-option .cam-badge  {
            font-size: 0.78rem;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: bold;
        }
        .badge-warn { background: #ffeaa7; color: #d35400; }
        .badge-ok   { background: #d5f5e3; color: #1e8449; }
    </style>
</head>
<body>
    <header class="page-header">
        <div class="logo">👁 독서 아이트래킹</div>
    </header>

    <div class="page-content">
        <div class="hero" style="padding-bottom: 32px;">
            <h1>눈으로 읽는 습관,<br>AI가 함께 교정합니다</h1>
            <p>
                웹캠과 시선 추적 기술을 이용해<br>
                당신의 독서 습관을 실시간으로 분석합니다.
            </p>
        </div>

        <!-- 웹캠 동의 카드 -->
        <div style="
            background: white; border-radius: 14px; padding: 36px;
            max-width: 520px; margin: 0 auto;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
            border-top: 4px solid #3498db;
        ">
            <div style="text-align:center; margin-bottom: 24px;">
                <div style="font-size: 2.5rem; margin-bottom: 12px;">🎥</div>
                <h2 style="font-size: 1.3rem; margin-bottom: 10px;">웹캠 사용 동의</h2>
                <p style="color:#555; line-height:1.8; font-size:0.95rem;">
                    이 서비스는 시선 추적을 위해 <strong>웹캠을 사용</strong>합니다.<br>
                    촬영 영상은 서버에 저장되지 않으며 시선 좌표 계산에만 사용됩니다.
                </p>
            </div>

            <!-- STEP 1: 카메라 스캔 -->
            <div id="step-scan">
                <button id="scan-btn" class="btn btn-primary" style="width:100%;">
                    🔍 카메라 스캔하기
                </button>
                <p style="color:#aaa; font-size:0.82rem; text-align:center; margin-top:8px;">
                    사용 가능한 카메라 목록을 자동으로 찾습니다
                </p>
            </div>

            <!-- STEP 2: 카메라 선택 (스캔 후 표시) -->
            <div id="step-select" style="display:none;">
                <p style="font-size:0.9rem; color:#444; margin-bottom:10px; font-weight:bold;">
                    사용할 카메라를 선택하세요:
                </p>
                <div id="camera-list"></div>
                <div style="display:flex; gap:10px; margin-top:16px;">
                    <button id="agree-btn" class="btn btn-success" style="flex:1;" disabled>
                        동의하고 시작하기 →
                    </button>
                    <button class="btn btn-danger" onclick="history.back()">거부</button>
                </div>
            </div>

            <div id="consent-status" style="margin-top:14px; font-size:0.9rem; color:#666; text-align:center; min-height:20px;"></div>
        </div>

        <!-- [DEV] ↓↓↓ 개발자 모드 — 배포 전 제거 ↓↓↓ -->
        <!-- 개발자 모드 (웹캠 없이 마우스로 테스트) -->
        <div style="text-align:center; margin-top:20px;">
            <button id="dev-mode-btn" style="
                background: none;
                border: 1px dashed #bbb;
                color: #999;
                padding: 7px 20px;
                border-radius: 8px;
                cursor: pointer;
                font-size: 0.82rem;
                transition: all 0.2s;
            " onmouseover="this.style.borderColor='#888';this.style.color='#666';"
               onmouseout="this.style.borderColor='#bbb';this.style.color='#999';">
                🛠 개발자 모드
            </button>
            <p style="color:#ccc; font-size:0.76rem; margin-top:5px;">
                웹캠 없이 마우스로 시선 추적 시뮬레이션
            </p>
        </div>
    </div>

    <script>
    let selectedCameraIndex = null;

    // ── STEP 1: 카메라 스캔 ───────────────────────────────────
    document.getElementById('scan-btn').addEventListener('click', async () => {
        const btn    = document.getElementById('scan-btn');
        const status = document.getElementById('consent-status');

        btn.disabled    = true;
        btn.textContent = '스캔 중...';
        status.textContent = '';

        try {
            const res  = await fetch('/api/webcam/scan');
            const data = await res.json();

            if (data.cameras.length === 0) {
                status.style.color = '#e74c3c';
                status.textContent = '❌ 카메라를 찾을 수 없습니다. 웹캠을 연결해주세요.';
                btn.disabled = false;
                btn.textContent = '🔍 다시 스캔';
                return;
            }

            // 카메라 목록 표시
            renderCameraList(data.cameras);
            document.getElementById('step-scan').style.display   = 'none';
            document.getElementById('step-select').style.display = 'block';

            // 정상 카메라(is_black=false)가 있으면 자동 선택
            const validCam = data.cameras.find(c => !c.is_black) ?? data.cameras[0];
            selectCamera(validCam.index);

        } catch (e) {
            status.style.color = '#e74c3c';
            status.textContent = '❌ 서버 연결 오류';
            btn.disabled    = false;
            btn.textContent = '🔍 카메라 스캔하기';
        }
    });

    // ── 카메라 목록 렌더링 ────────────────────────────────────
    function renderCameraList(cameras) {
        const list = document.getElementById('camera-list');
        list.innerHTML = '';

        cameras.forEach(cam => {
            const div   = document.createElement('div');
            div.className = 'camera-option';
            div.dataset.index = cam.index;

            const badge = cam.is_black
                ? `<span class="cam-badge badge-warn">가상/빈 화면</span>`
                : `<span class="cam-badge badge-ok">정상</span>`;

            div.innerHTML = `
                <input type="radio" name="camera" value="${cam.index}">
                <span class="cam-label">카메라 ${cam.index}번</span>
                ${badge}
            `;

            div.addEventListener('click', () => {
                div.querySelector('input').checked = true;
                selectCamera(cam.index);
            });

            list.appendChild(div);
        });
    }

    function selectCamera(index) {
        selectedCameraIndex = index;
        document.querySelectorAll('.camera-option').forEach(el => {
            el.classList.toggle('selected', parseInt(el.dataset.index) === index);
            el.querySelector('input').checked = parseInt(el.dataset.index) === index;
        });
        document.getElementById('agree-btn').disabled = false;
    }

    // [DEV] ↓↓↓ 개발자 모드 — 배포 전 제거 ↓↓↓
    document.getElementById('dev-mode-btn').addEventListener('click', () => {
        localStorage.setItem('devMode', 'true');
        location.href = '/guide.html';
    });

    // ── STEP 2: 동의 및 시작 ─────────────────────────────────
    document.getElementById('agree-btn').addEventListener('click', async () => {
        const btn    = document.getElementById('agree-btn');
        const status = document.getElementById('consent-status');

        btn.disabled    = true;
        btn.textContent = '웹캠 활성화 중...';

        try {
            // 선택한 카메라 인덱스 저장 → widget.js 에서 재사용
            localStorage.setItem('cameraIndex', selectedCameraIndex);

            const res  = await fetch('/api/webcam/start', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ camera_index: selectedCameraIndex }),
            });
            const data = await res.json();

            if (data.success) {
                status.style.color = '#27ae60';
                status.textContent = '✅ 웹캠 활성화됨. 보정 페이지로 이동합니다...';
                setTimeout(() => { location.href = '/calibration.html'; }, 800);
            } else {
                status.style.color = '#e74c3c';
                status.textContent = '❌ 웹캠을 열 수 없습니다. 다른 카메라를 선택해보세요.';
                btn.disabled    = false;
                btn.textContent = '동의하고 시작하기 →';
            }
        } catch (e) {
            status.style.color = '#e74c3c';
            status.textContent = '❌ 서버 연결 오류';
            btn.disabled    = false;
            btn.textContent = '동의하고 시작하기 →';
        }
    });
    </script>
</body>
</html>
