<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>독서 아이트래킹</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="page-header">
        <div class="logo">👁 독서 아이트래킹</div>
    </header>

    <div class="page-content">
        <div class="hero">
            <h1>눈으로 읽는 습관,<br>AI가 함께 교정합니다</h1>
            <p>
                웹캠과 시선 추적 기술을 이용해<br>
                당신의 독서 습관을 실시간으로 분석합니다.
            </p>
            <button class="btn btn-primary" onclick="location.href='app.html'">
                독서 습관 교정 시작하기 →
            </button>
        </div>

        <div class="feature-grid">
            <div class="feature-card">
                <div class="icon">🎯</div>
                <h3>시선 보정</h3>
                <p>9개 지점 보정으로 정확한 시선 추적을 준비합니다</p>
            </div>
            <div class="feature-card">
                <div class="icon">📖</div>
                <h3>독서 분석</h3>
                <p>읽는 도중 시선의 흐름을 실시간으로 추적합니다</p>
            </div>
            <div class="feature-card">
                <div class="icon">✅</div>
                <h3>습관 교정</h3>
                <p>건강한 독서 습관 형성을 도와줍니다</p>
            </div>
        </div>

        <p style="text-align:center; color:#999; font-size:0.9rem; margin-top:16px;">
            ⚠ 웹캠이 필요합니다. 밝은 환경에서 사용하세요.
        </p>
    </div>
</body>
</html>
