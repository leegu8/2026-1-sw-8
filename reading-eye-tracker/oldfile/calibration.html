<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시선 보정 | 독서 아이트래킹</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/webgazer@2.1.0/dist/webgazer.js"></script>
</head>
<body>
    <header class="page-header">
        <div class="logo">👁 독서 아이트래킹</div>
        <div class="progress-bar">
            <div class="progress-step active">
                <div class="circle">1</div> 시선 보정
            </div>
            <div class="progress-line"></div>
            <div class="progress-step">
                <div class="circle">2</div> 사용 안내
            </div>
            <div class="progress-line"></div>
            <div class="progress-step">
                <div class="circle">3</div> 독서하기
            </div>
        </div>
    </header>

    <div id="gaze-dot"></div>

    <!-- 보정 오버레이 -->
    <div id="calibration-overlay">
        <div id="cal-header">
            <div id="cal-instruction">각 점을 바라보면서 5번씩 클릭하세요</div>
            <div id="cal-progress">0 / 9 완료</div>
        </div>
    </div>

    <div class="page-content" style="text-align:center;">
        <h2 style="font-size:1.6rem; margin-bottom:12px;">시선 보정</h2>
        <p style="color:#666; margin-bottom:32px; line-height:1.8;">
            정확한 시선 추적을 위해 초기 보정이 필요합니다.<br>
            화면이 어두워지면 각 점을 <strong>바라보면서</strong> 클릭해 주세요.
        </p>
        <button id="start-btn" class="btn btn-primary">웹캠 켜고 보정 시작</button>
        <div id="status"></div>
    </div>

    <script src="calibration.js"></script>
</body>
</html>
